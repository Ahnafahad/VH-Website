<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0F0F" />
  <title>LexiCore</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100dvh; display: grid; place-items: center; padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left)); background: #0f0f0f; color: #f5f5f5; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    main { width: min(100%, 360px); text-align: center; }
    .mark { width: 64px; height: 64px; margin: 0 auto 24px; display: grid; place-items: center; border: 1px solid #3a3a3a; border-radius: 18px; color: #f4a828; font-family: Georgia, serif; font-size: 42px; line-height: 1; }
    h1 { margin: 0; font-family: Georgia, serif; font-size: 2rem; font-weight: 600; letter-spacing: -.02em; }
    .status { margin: 32px 0 8px; font-size: 1rem; font-weight: 650; }
    .detail { margin: 0 auto; max-width: 32ch; color: #b0b0b0; line-height: 1.55; }
    button { width: 100%; min-height: 48px; margin-top: 24px; border: 0; border-radius: 12px; background: #e63946; color: white; font: inherit; font-weight: 700; cursor: pointer; }
    button:focus-visible { outline: 3px solid #f4a828; outline-offset: 3px; }
    .hint { margin-top: 16px; color: #858585; font-size: .8125rem; }
    @media (prefers-reduced-motion: no-preference) { button:active { transform: scale(.98); } }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">L</div>
    <h1>LexiCore</h1>
    <p class="status" id="status">We couldn’t reach LexiCore</p>
    <p class="detail" id="detail">Check your connection, then try again. Your learning progress is stored safely in your account.</p>
    <button type="button" id="retry">Try again</button>
    <p class="hint">LexiCore needs an internet connection to start a session.</p>
  </main>
  <script>
    const retry = document.getElementById('retry');
    const status = document.getElementById('status');
    const detail = document.getElementById('detail');
    retry.addEventListener('click', () => {
      retry.disabled = true;
      retry.textContent = 'Reconnecting…';
      status.textContent = 'Checking your connection';
      detail.textContent = 'Keep this screen open. We’ll return you to LexiCore as soon as it is available.';
      window.location.href = 'https://www.vh-beyondthehorizons.org/vocab';
      window.setTimeout(() => { retry.disabled = false; retry.textContent = 'Try again'; }, 5000);
    });
  </script>
</body>
</html>
