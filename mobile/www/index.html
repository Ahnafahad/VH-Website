<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beyond the Horizons</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F0F0F;
      color: #E5E5E5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #FFFFFF;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 0.875rem;
      color: #888888;
      margin-bottom: 2.5rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      opacity: 0.4;
    }
    .message {
      font-size: 1.125rem;
      font-weight: 600;
      color: #FFFFFF;
      margin-bottom: 0.75rem;
    }
    .sub {
      font-size: 0.875rem;
      color: #666666;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="logo">Beyond the Horizons</div>
  <div class="tagline">IBA &bull; BUP &bull; FBS Coaching</div>

  <svg class="icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="32" cy="32" r="28" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M20 32 Q32 18 44 32" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <circle cx="32" cy="36" r="4" fill="#FFFFFF"/>
  </svg>

  <p class="message">No Internet Connection</p>
  <p class="sub">Please connect to the internet<br>to use Beyond the Horizons.</p>
</body>
</html>
