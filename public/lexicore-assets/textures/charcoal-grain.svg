<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Seamless dark charcoal grain">
  <filter id="grain" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="4" seed="17" stitchTiles="stitch"/>
    <feColorMatrix values=".18 0 0 0 0  0 .18 0 0 0  0 0 .18 0 0  0 0 0 .18 0"/>
  </filter>
  <rect width="256" height="256" fill="#1A1A1A"/>
  <rect width="256" height="256" filter="url(#grain)" opacity=".28"/>
</svg>
